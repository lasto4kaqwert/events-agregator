services:
  app:
    build: .
    env_file:
      - .env
    container_name: events_agregator

    depends_on:
      db:
        condition: service_healthy
    
    environment:
      DATABASE_URL: ${POSTGRES_CONNECTION_STRING}
      PYTHONPATH: /app
    
    ports:
      - "8000:8000"

    volumes:
      - .:/app
      
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    
  db:
    image: postgres:16-alpine
    container_name: events_agregator_db

    environment:
      
      POSTGRES_DB: ${POSTGRES_DATABASE_NAME}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - events_agregator_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events_agregator"]
      interval: "3s"
      timeout: "3s"
      retries: 10

volumes:
  events_agregator_data: